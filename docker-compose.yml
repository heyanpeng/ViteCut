# ViteCut 前后端 - 使用云服务器上的 MySQL
# 在项目根目录创建 .env，参考 .env.example
# 构建: docker compose build  启动: docker compose up -d

services:
  vitecut-api:
    image: vitecut-api:latest
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      # 基础镜像地址（从 GHCR 拉取）
      # 格式：ghcr.io/<你的GitHub用户名>/vitecut-base:latest
      # 如果使用本地构建的基础镜像，设置为：vitecut-base:latest
      # 可以通过环境变量 BASE_IMAGE 覆盖
      args:
        - BASE_IMAGE=${BASE_IMAGE:-vitecut-base:latest}
        - NPM_REGISTRY=${NPM_REGISTRY}
    container_name: vitecut-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # 基础环境配置
      - NODE_ENV=production # 生产环境变量
      - PORT=3001 # API 端口

      # MySQL 数据库配置
      - MYSQL_HOST=${MYSQL_HOST} # MySQL 主机地址，从 .env 读取
      - MYSQL_PORT=${MYSQL_PORT:-3306} # MySQL 端口，默认 3306
      - MYSQL_USER=${MYSQL_USER} # MySQL 用户名，从 .env 读取
      - MYSQL_PASSWORD=${MYSQL_PASSWORD} # MySQL 密码，从 .env 读取
      - MYSQL_DATABASE=${MYSQL_DATABASE:-vitecut} # 数据库名，默认 vitecut

      # 阿里云 OSS 配置
      - OSS_REGION=${OSS_REGION} # OSS 区域
      - OSS_BUCKET=${OSS_BUCKET} # OSS 存储桶名称
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID} # OSS AccessKey ID
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET} # OSS AccessKey Secret
      - OSS_ENDPOINT=${OSS_ENDPOINT} # OSS 端点地址
      - OSS_PUBLIC_BASE_URL=${OSS_PUBLIC_BASE_URL} # OSS 公共访问基础 URL
      - OSS_KEY_PREFIX=${OSS_KEY_PREFIX} # OSS 对象键前缀
      - OSS_STS_TOKEN=${OSS_STS_TOKEN} # OSS STS Token（可选）
      - OSS_INTERNAL=${OSS_INTERNAL:-false} # 是否使用内网访问，默认 false
      - OSS_SECURE=${OSS_SECURE:-true} # 是否使用 HTTPS，默认 true
      - OSS_READ_URL_EXPIRES_SECONDS=${OSS_READ_URL_EXPIRES_SECONDS:-900} # 读取 URL 过期时间（秒），默认 900

      # 存储驱动配置（oss|minio）
      - STORAGE_DRIVER=${STORAGE_DRIVER:-oss} # 存储驱动，默认 oss

      # MinIO 配置（当 STORAGE_DRIVER=minio 时生效）
      - MINIO_ENDPOINT=${MINIO_ENDPOINT} # MinIO 服务地址
      - MINIO_PORT=${MINIO_PORT} # MinIO 服务端口（可选）
      - MINIO_USE_SSL=${MINIO_USE_SSL:-true} # MinIO 是否启用 HTTPS，默认 true
      - MINIO_BUCKET=${MINIO_BUCKET} # MinIO 存储桶名称
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY} # MinIO Access Key
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY} # MinIO Secret Key
      - MINIO_SESSION_TOKEN=${MINIO_SESSION_TOKEN} # MinIO STS Token（可选）
      - MINIO_REGION=${MINIO_REGION} # MinIO 区域（可选）
      - MINIO_PUBLIC_BASE_URL=${MINIO_PUBLIC_BASE_URL} # MinIO 公共访问基础 URL（可选）
      - MINIO_KEY_PREFIX=${MINIO_KEY_PREFIX} # MinIO 对象键前缀（可选）

      # JWT 鉴权配置（生产环境务必设置）
      - JWT_SECRET=${JWT_SECRET} # JWT 密钥，用于生成和验证 token

      # 火山方舟（豆包 Seedream 图片生成）配置
      - ARK_API_KEY=${ARK_API_KEY} # 火山方舟 API Key
      - ARK_ENDPOINT_DOUBAO_SEEDREAM_5_0_LITE=${ARK_ENDPOINT_DOUBAO_SEEDREAM_5_0_LITE} # 豆包 Seedream 5.0 Lite 端点
      - ARK_ENDPOINT_DOUBAO_SEEDREAM_4_5=${ARK_ENDPOINT_DOUBAO_SEEDREAM_4_5} # 豆包 Seedream 4.5 端点
      - ARK_ENDPOINT_DOUBAO_SEEDREAM_4_0=${ARK_ENDPOINT_DOUBAO_SEEDREAM_4_0} # 豆包 Seedream 4.0 端点
      - ARK_ENDPOINT_DOUBAO_SEEDREAM_3_0_T2I=${ARK_ENDPOINT_DOUBAO_SEEDREAM_3_0_T2I} # 豆包 Seedream 3.0 T2I 端点
      - ARK_ENDPOINT_SEED_1_8=${ARK_ENDPOINT_SEED_1_8} # Seed 1.8 端点
      - ARK_ENDPOINT_SEEDANCE_1_5_PRO=${ARK_ENDPOINT_SEEDANCE_1_5_PRO} # Seedance 1.5 Pro 端点
      - ARK_ENDPOINT_SEEDANCE_1_0_PRO=${ARK_ENDPOINT_SEEDANCE_1_0_PRO} # Seedance 1.0 Pro 端点

  vitecut-app:
    image: vitecut-app:latest
    build:
      context: .
      dockerfile: packages/app/Dockerfile
      # 基础镜像地址（从 GHCR 拉取，与 API 保持一致）
      # 可以通过环境变量 BASE_IMAGE 覆盖
      args:
        - BASE_IMAGE=${BASE_IMAGE:-vitecut-base:latest}
        - NPM_REGISTRY=${NPM_REGISTRY}
        - VITE_PEXELS_API_KEY=${VITE_PEXELS_API_KEY}
        - VITE_FREESOUND_API_KEY=${VITE_FREESOUND_API_KEY}
    container_name: vitecut-app
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - vitecut-api
