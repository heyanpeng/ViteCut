# 手动部署 workflow - 通过 GitHub Actions 页面手动触发部署
# 使用方法：
# 1. 进入 GitHub 仓库 → Actions → Deploy
# 2. 点击 "Run workflow" → 选择分支（通常是 master）→ "Run workflow"
# 
# SSH 相关信息通过 GitHub 仓库的 Actions Secrets 设置（SSH_HOST、SSH_USER、SSH_KEY）。
# 所有环境变量也通过 GitHub Secrets 设置，避免在服务器上存储敏感信息。
#
# 重要：必须在 docker compose build 之前创建 .env 文件，因为：
# 1. 构建时需要从 .env 读取 VITE_PEXELS_API_KEY 和 VITE_FREESOUND_API_KEY（通过 build.args）
# 2. 运行时需要从 .env 读取所有环境变量（通过 environment）
name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '要部署的分支或 tag（如 master、v1.0.0）'
        required: true
        default: 'master'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 使用 appleboy/ssh-action，通过 SSH 手动部署项目。
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 进入项目目录
            cd /opt/ViteCut

            # 获取要部署的分支或 tag（从 workflow 输入获取）
            DEPLOY_REF=${{ github.event.inputs.branch }}
            echo "=========================================="
            echo "开始部署: ${DEPLOY_REF}"
            echo "=========================================="
            
            # 拉取所有代码和 tags
            git fetch origin --tags --force
            git fetch origin
            
            # 切换到指定的分支或 tag
            git checkout ${DEPLOY_REF}
            
            # 显示当前版本信息
            echo "当前部署版本: $(git describe --tags --exact-match HEAD 2>/dev/null || git rev-parse --short HEAD)"
            echo "当前提交: $(git rev-parse --short HEAD)"
            echo "当前分支/Tag: $(git branch --show-current 2>/dev/null || git describe --tags --exact-match HEAD 2>/dev/null || echo 'detached HEAD')"

            # 从 GitHub Secrets 创建 .env 文件
            # 必须在 docker compose build 之前创建，因为构建时需要读取环境变量
            # 注意：如果某个 Secret 不存在，${{ secrets.XXX }} 会返回空字符串
            # 可选变量如果 Secret 不存在，将使用空字符串，docker-compose.yml 中的默认值会生效
            cat > .env << ENVEOF
            # MySQL 数据库配置
            MYSQL_HOST=${{ secrets.MYSQL_HOST }}
            MYSQL_PORT=${{ secrets.MYSQL_PORT }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}

            # API 端口
            PORT=3001

            # 阿里云 OSS 配置
            OSS_REGION=${{ secrets.OSS_REGION }}
            OSS_BUCKET=${{ secrets.OSS_BUCKET }}
            OSS_ACCESS_KEY_ID=${{ secrets.OSS_ACCESS_KEY_ID }}
            OSS_ACCESS_KEY_SECRET=${{ secrets.OSS_ACCESS_KEY_SECRET }}
            OSS_ENDPOINT=${{ secrets.OSS_ENDPOINT }}
            OSS_PUBLIC_BASE_URL=${{ secrets.OSS_PUBLIC_BASE_URL }}
            OSS_KEY_PREFIX=${{ secrets.OSS_KEY_PREFIX }}
            OSS_STS_TOKEN=${{ secrets.OSS_STS_TOKEN }}
            OSS_INTERNAL=${{ secrets.OSS_INTERNAL }}
            OSS_SECURE=${{ secrets.OSS_SECURE }}
            OSS_READ_URL_EXPIRES_SECONDS=${{ secrets.OSS_READ_URL_EXPIRES_SECONDS }}

            # JWT 鉴权配置
            JWT_SECRET=${{ secrets.JWT_SECRET }}

            # 火山方舟配置（可选，如果不需要 AI 图片生成功能可以不设置）
            ARK_API_KEY=${{ secrets.ARK_API_KEY }}
            ARK_ENDPOINT_DOUBAO_SEEDREAM_5_0_LITE=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_5_0_LITE }}
            ARK_ENDPOINT_DOUBAO_SEEDREAM_4_5=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_4_5 }}
            ARK_ENDPOINT_DOUBAO_SEEDREAM_4_0=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_4_0 }}
            ARK_ENDPOINT_DOUBAO_SEEDREAM_3_0_T2I=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_3_0_T2I }}
            ARK_ENDPOINT_SEED_1_8=${{ secrets.ARK_ENDPOINT_SEED_1_8 }}
            ARK_ENDPOINT_SEEDANCE_1_5_PRO=${{ secrets.ARK_ENDPOINT_SEEDANCE_1_5_PRO }}
            ARK_ENDPOINT_SEEDANCE_1_0_PRO=${{ secrets.ARK_ENDPOINT_SEEDANCE_1_0_PRO }}

            # 前端构建时需要的 API Key（通过 build.args 传递给 Dockerfile）
            VITE_PEXELS_API_KEY=${{ secrets.VITE_PEXELS_API_KEY }}
            VITE_FREESOUND_API_KEY=${{ secrets.VITE_FREESOUND_API_KEY }}
            ENVEOF

            # 设置 .env 文件权限，仅所有者可读写
            chmod 600 .env

            # 验证 .env 文件已创建
            ls -la .env

            # 使用 GHCR 镜像（必须）
            # 1. 登录到 GHCR
            echo "=========================================="
            echo "配置基础镜像（GHCR）"
            echo "=========================================="
            echo "登录到 GHCR..."
            if ! echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin; then
              echo "✗ 错误: 无法登录到 GHCR"
              exit 1
            fi
            echo "✓ GHCR 登录成功"
            
            # 2. 设置基础镜像地址（GHCR）
            BASE_IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/vitecut-base:latest"
            export BASE_IMAGE=${BASE_IMAGE_NAME}
            echo "目标基础镜像: ${BASE_IMAGE}"
            
            # 3. 拉取 GHCR 基础镜像（必须成功）
            echo "从 GHCR 拉取基础镜像..."
            if ! docker pull ${BASE_IMAGE_NAME}; then
              echo "✗ 错误: 无法从 GHCR 拉取基础镜像: ${BASE_IMAGE_NAME}"
              echo "请先运行 build-base-image workflow 构建并推送基础镜像到 GHCR"
              echo "或者检查镜像是否存在: https://github.com/${{ github.repository_owner }}?tab=packages"
              exit 1
            fi
            
            # 4. 验证基础镜像
            if ! docker image inspect ${BASE_IMAGE_NAME} >/dev/null 2>&1; then
              echo "✗ 错误: 基础镜像拉取后验证失败: ${BASE_IMAGE_NAME}"
              exit 1
            fi
            
            echo "✓ GHCR 基础镜像已就绪: ${BASE_IMAGE}"

            # 重新构建应用服务（vitecut-api 和 vitecut-app）
            # 使用 --no-cache 强制重新构建应用代码（因为代码可能变化）
            # 基础镜像从 GHCR 拉取
            echo "开始构建应用服务..."
            docker compose build --no-cache vitecut-api vitecut-app

            # 以守护进程模式重启并启动所有服务
            docker compose up -d
