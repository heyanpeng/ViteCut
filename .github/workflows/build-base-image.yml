name: Build Base Image

on:
  push:
    paths:
      - "Dockerfile.base"
      - "package.json"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 登录到 GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 提取 Docker 元数据（核心步骤：自动处理小写转换）
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # images 填入你的镜像全名，该 Action 会自动将其转为全小写
          images: ghcr.io/${{ github.repository_owner }}/vitecut-base
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 3. 设置 Docker Buildx（用于构建镜像）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 构建并推送镜像
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.base
          push: true
          # 引用上面 meta 步骤生成的 tags 和 labels
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 推荐开启缓存，加快下次构建速度
          cache-from: type=gha
          cache-to: type=gha,mode=max
