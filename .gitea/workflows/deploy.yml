# ViteCut 项目自动部署工作流
# 触发方式：在 Gitea Actions 页面手动点击 "Run workflow" 触发
name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "要部署的分支或 tag（如 master、v1.0.0）"
        required: true
        default: "master"
        type: string

jobs:
  deploy:
    runs-on: act_runner
    steps:
      # 使用 appleboy/ssh-action 远程登录你的阿里云服务器执行脚本
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # set -e: 遇到错误立即退出; -u: 变量未定义报错; -o pipefail: 管道错误也报错
            set -euo pipefail

            # 1. 进入宿主机上的项目目录
            cd /opt/ViteCut

            DEPLOY_REF=${{ github.event.inputs.branch }}
            echo "=========================================="
            echo "🚀 开始从 Gitea 内部仓库部署: ${DEPLOY_REF}"
            echo "=========================================="

            # 2. 拉取最新代码（带 3 次重试机制，应对网络抖动）
            fetch_ok=0
            for i in 1 2 3; do
              echo "第 ${i} 次从远端拉取代码..."
              if git fetch origin --tags --prune --force; then
                fetch_ok=1
                break
              fi
              echo "⚠️ git fetch 失败，等待后重试..."
              sleep 3
            done
            if [ "$fetch_ok" -ne 1 ]; then 
              echo "❌ 错误: 无法连接到 Gitea Git 服务"
              exit 1 
            fi

            # 3. 强制切换到目标分支或 Tag，确保代码与仓库一致
            echo "正在切换代码到: ${DEPLOY_REF}"
            git checkout -B "${DEPLOY_REF}" "origin/${DEPLOY_REF}" || git checkout "${DEPLOY_REF}"

            # 4. 动态生成 .env 环境变量文件
            # 这里的 secrets 必须在 Gitea 仓库设置中提前录入
            echo "📝 正在根据 Gitea Secrets 生成 .env 文件..."
            cat > .env << ENVEOF
            # 数据库配置
            MYSQL_HOST=${{ secrets.MYSQL_HOST }}
            MYSQL_PORT=${{ secrets.MYSQL_PORT }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}

            # 服务运行端口
            PORT=3001
            NPM_REGISTRY=${{ secrets.NPM_REGISTRY }}

            # 存储驱动配置（oss 或 minio）
            STORAGE_DRIVER=${{ secrets.STORAGE_DRIVER }}

            # 阿里云 OSS 存储配置
            OSS_REGION=${{ secrets.OSS_REGION }}
            OSS_BUCKET=${{ secrets.OSS_BUCKET }}
            OSS_ACCESS_KEY_ID=${{ secrets.OSS_ACCESS_KEY_ID }}
            OSS_ACCESS_KEY_SECRET=${{ secrets.OSS_ACCESS_KEY_SECRET }}
            OSS_ENDPOINT=${{ secrets.OSS_ENDPOINT }}
            OSS_PUBLIC_BASE_URL=${{ secrets.OSS_PUBLIC_BASE_URL }}
            OSS_KEY_PREFIX=${{ secrets.OSS_KEY_PREFIX }}
            OSS_STS_TOKEN=${{ secrets.OSS_STS_TOKEN }}
            OSS_INTERNAL=${{ secrets.OSS_INTERNAL }}
            OSS_SECURE=${{ secrets.OSS_SECURE }}
            OSS_READ_URL_EXPIRES_SECONDS=${{ secrets.OSS_READ_URL_EXPIRES_SECONDS }}

            # MinIO 存储配置
            MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}
            MINIO_PORT=${{ secrets.MINIO_PORT }}
            MINIO_USE_SSL=${{ secrets.MINIO_USE_SSL }}
            MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}
            MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
            MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
            MINIO_SESSION_TOKEN=${{ secrets.MINIO_SESSION_TOKEN }}
            MINIO_REGION=${{ secrets.MINIO_REGION }}
            MINIO_PUBLIC_BASE_URL=${{ secrets.MINIO_PUBLIC_BASE_URL }}
            MINIO_KEY_PREFIX=${{ secrets.MINIO_KEY_PREFIX }}

            # 安全鉴权
            JWT_SECRET=${{ secrets.JWT_SECRET }}

            # 火山引擎 AI 配置
            ARK_API_KEY=${{ secrets.ARK_API_KEY }}
            ARK_ENDPOINT_DOUBAO_SEEDREAM_5_0_LITE=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_5_0_LITE }}
            ARK_ENDPOINT_DOUBAO_SEEDREAM_4_5=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_4_5 }}
            ARK_ENDPOINT_DOUBAO_SEEDREAM_4_0=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_4_0 }}
            ARK_ENDPOINT_DOUBAO_SEEDREAM_3_0_T2I=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_3_0_T2I }}
            ARK_ENDPOINT_SEED_1_8=${{ secrets.ARK_ENDPOINT_SEED_1_8 }}
            ARK_ENDPOINT_SEEDANCE_1_5_PRO=${{ secrets.ARK_ENDPOINT_SEEDANCE_1_5_PRO }}
            ARK_ENDPOINT_SEEDANCE_1_0_PRO=${{ secrets.ARK_ENDPOINT_SEEDANCE_1_0_PRO }}

            # 前端构建参数
            VITE_PEXELS_API_KEY=${{ secrets.VITE_PEXELS_API_KEY }}
            VITE_FREESOUND_API_KEY=${{ secrets.VITE_FREESOUND_API_KEY }}
            ENVEOF

            # 设置权限，防止其他普通用户读取环境变量
            chmod 600 .env

            # 5. 登录到你的 Gitea 私有镜像仓库
            echo "=========================================="
            echo "🔑 正在登录内部镜像仓库 (Registry)..."
            echo "${{ secrets.MY_GITEA_TOKEN }}" | docker login 47.110.148.112:8081 -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 6. 配置并拉取你在 Build Workflow 中生成的 Base 镜像
            # 这里的镜像地址必须与 Build Base Image 工作流产生的地址完全一致
            BASE_IMAGE_NAME="47.110.148.112:8081/${{ gitea.repository_owner }}/vitecut-base:latest"
            export BASE_IMAGE=${BASE_IMAGE_NAME}

            echo "正在同步基础镜像: ${BASE_IMAGE_NAME}"
            docker pull ${BASE_IMAGE_NAME}

            # 7. 构建前的安全校验
            echo "🔍 校验 Dockerfile 构建脚本是否合法..."
            if ! grep -Fq "RUN pnpm install --frozen-lockfile --ignore-scripts" packages/app/Dockerfile; then
              echo "❌ 错误: Dockerfile 未包含必要的 --ignore-scripts 参数，构建被中止"
              exit 1
            fi

            # 8. 重新构建应用容器（vitecut-api 和 vitecut-app）
            # --no-cache 确保每次部署都使用最新的代码构建
            echo "🏗️ 开始使用 Docker Compose 构建应用..."
            docker compose build --no-cache vitecut-api vitecut-app

            # 9. 启动/重启服务
            echo "⚙️ 正在启动服务..."
            docker compose up -d

            # 10. 清理无用的旧镜像碎片，释放阿里云磁盘空间
            docker image prune -f

            echo "✅ 部署圆满成功！"
