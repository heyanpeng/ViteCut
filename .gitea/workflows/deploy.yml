# ViteCut 项目自动部署工作流
# 触发方式：在 Gitea Actions 页面手动点击 "Run workflow" 触发
name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "要部署的分支或 tag（如 master、v1.0.0）"
        required: true
        default: "master"
        type: string

jobs:
  deploy:
    runs-on: act_runner
    # 使用自带 git/ssh 客户端的镜像，避免依赖 GitHub Marketplace Action 拉取
    container:
      image: alpine/git:latest
    steps:
      # 使用 Runner 原生 ssh 远程登录服务器执行脚本
      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_REF: ${{ github.event.inputs.branch }}
        run: |
          # set -e: 遇到错误立即退出; -u: 变量未定义报错; -o pipefail: 管道错误也报错
          set -euo pipefail

          # 0. 基础依赖自检
          command -v ssh >/dev/null 2>&1 || { echo "❌ 当前镜像未包含 ssh 客户端"; exit 1; }
          command -v ssh-keyscan >/dev/null 2>&1 || { echo "❌ 当前镜像未包含 ssh-keyscan"; exit 1; }

          # 1. 初始化 SSH 连接配置
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" "DEPLOY_REF='$DEPLOY_REF' bash -se" <<'EOF'
            set -euo pipefail

            # 2. 进入宿主机上的项目目录
            cd /opt/ViteCut

            echo "=========================================="
            echo "🚀 开始从 Gitea 内部仓库部署: ${DEPLOY_REF}"
            echo "=========================================="

            # 3. 拉取最新代码（带 3 次重试机制，应对网络抖动）
            fetch_ok=0
            for i in 1 2 3; do
              echo "第 ${i} 次从远端拉取代码..."
              if git fetch origin --tags --prune --force; then
                fetch_ok=1
                break
              fi
              echo "⚠️ git fetch 失败，等待后重试..."
              sleep 3
            done
            if [ "$fetch_ok" -ne 1 ]; then
              echo "❌ 错误: 无法连接到 Gitea Git 服务"
              exit 1
            fi

            # 4. 强制切换到目标分支或 Tag，确保代码与仓库一致
            echo "正在切换代码到: ${DEPLOY_REF}"
            git checkout -B "${DEPLOY_REF}" "origin/${DEPLOY_REF}" || git checkout "${DEPLOY_REF}"

            # 5. 动态生成 .env 环境变量文件
            echo "📝 正在根据 Gitea Secrets 生成 .env 文件..."
            {
              echo "# 数据库配置"
              echo "MYSQL_HOST=${{ secrets.MYSQL_HOST }}"
              echo "MYSQL_PORT=${{ secrets.MYSQL_PORT }}"
              echo "MYSQL_USER=${{ secrets.MYSQL_USER }}"
              echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}"
              echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}"
              echo
              echo "# 服务运行端口"
              echo "PORT=3001"
              echo "NPM_REGISTRY=${{ secrets.NPM_REGISTRY }}"
              echo
              echo "# 存储驱动配置（oss 或 minio）"
              echo "STORAGE_DRIVER=${{ secrets.STORAGE_DRIVER }}"
              echo
              echo "# 阿里云 OSS 存储配置"
              echo "OSS_REGION=${{ secrets.OSS_REGION }}"
              echo "OSS_BUCKET=${{ secrets.OSS_BUCKET }}"
              echo "OSS_ACCESS_KEY_ID=${{ secrets.OSS_ACCESS_KEY_ID }}"
              echo "OSS_ACCESS_KEY_SECRET=${{ secrets.OSS_ACCESS_KEY_SECRET }}"
              echo "OSS_ENDPOINT=${{ secrets.OSS_ENDPOINT }}"
              echo "OSS_PUBLIC_BASE_URL=${{ secrets.OSS_PUBLIC_BASE_URL }}"
              echo "OSS_KEY_PREFIX=${{ secrets.OSS_KEY_PREFIX }}"
              echo "OSS_STS_TOKEN=${{ secrets.OSS_STS_TOKEN }}"
              echo "OSS_INTERNAL=${{ secrets.OSS_INTERNAL }}"
              echo "OSS_SECURE=${{ secrets.OSS_SECURE }}"
              echo "OSS_READ_URL_EXPIRES_SECONDS=${{ secrets.OSS_READ_URL_EXPIRES_SECONDS }}"
              echo
              echo "# MinIO 存储配置"
              echo "MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}"
              echo "MINIO_PORT=${{ secrets.MINIO_PORT }}"
              echo "MINIO_USE_SSL=${{ secrets.MINIO_USE_SSL }}"
              echo "MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}"
              echo "MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}"
              echo "MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}"
              echo "MINIO_SESSION_TOKEN=${{ secrets.MINIO_SESSION_TOKEN }}"
              echo "MINIO_REGION=${{ secrets.MINIO_REGION }}"
              echo "MINIO_PUBLIC_BASE_URL=${{ secrets.MINIO_PUBLIC_BASE_URL }}"
              echo "MINIO_KEY_PREFIX=${{ secrets.MINIO_KEY_PREFIX }}"
              echo
              echo "# 安全鉴权"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo
              echo "# 火山引擎 AI 配置"
              echo "ARK_API_KEY=${{ secrets.ARK_API_KEY }}"
              echo "ARK_ENDPOINT_DOUBAO_SEEDREAM_5_0_LITE=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_5_0_LITE }}"
              echo "ARK_ENDPOINT_DOUBAO_SEEDREAM_4_5=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_4_5 }}"
              echo "ARK_ENDPOINT_DOUBAO_SEEDREAM_4_0=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_4_0 }}"
              echo "ARK_ENDPOINT_DOUBAO_SEEDREAM_3_0_T2I=${{ secrets.ARK_ENDPOINT_DOUBAO_SEEDREAM_3_0_T2I }}"
              echo "ARK_ENDPOINT_SEED_1_8=${{ secrets.ARK_ENDPOINT_SEED_1_8 }}"
              echo "ARK_ENDPOINT_SEEDANCE_1_5_PRO=${{ secrets.ARK_ENDPOINT_SEEDANCE_1_5_PRO }}"
              echo "ARK_ENDPOINT_SEEDANCE_1_0_PRO=${{ secrets.ARK_ENDPOINT_SEEDANCE_1_0_PRO }}"
              echo
              echo "# 前端构建参数"
              echo "VITE_PEXELS_API_KEY=${{ secrets.VITE_PEXELS_API_KEY }}"
              echo "VITE_FREESOUND_API_KEY=${{ secrets.VITE_FREESOUND_API_KEY }}"
            } > .env
            chmod 600 .env

            # 6. 登录到你的 Gitea 私有镜像仓库
            echo "=========================================="
            echo "🔑 正在登录内部镜像仓库 (Registry)..."
            echo "${{ secrets.MY_GITEA_TOKEN }}" | docker login 47.110.148.112:8081 -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 7. 拉取基础镜像
            BASE_IMAGE_NAME="47.110.148.112:8081/${{ gitea.repository_owner }}/vitecut-base:latest"
            export BASE_IMAGE=${BASE_IMAGE_NAME}
            echo "正在同步基础镜像: ${BASE_IMAGE_NAME}"
            docker pull ${BASE_IMAGE_NAME}

            # 8. 构建前的安全校验
            echo "🔍 校验 Dockerfile 构建脚本是否合法..."
            if ! grep -Fq "RUN pnpm install --frozen-lockfile --ignore-scripts" packages/app/Dockerfile; then
              echo "❌ 错误: Dockerfile 未包含必要的 --ignore-scripts 参数，构建被中止"
              exit 1
            fi

            # 9. 构建并启动服务
            echo "🏗️ 开始使用 Docker Compose 构建应用..."
            docker compose build --no-cache vitecut-api vitecut-app
            echo "⚙️ 正在启动服务..."
            docker compose up -d

            # 10. 清理旧镜像
            docker image prune -f
            echo "✅ 部署圆满成功！"
          EOF
