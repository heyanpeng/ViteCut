name: Build Base Image (Pure Local)

on:
  push:
    paths:
      - "Dockerfile.base"
      - "package.json"
  workflow_dispatch:

jobs:
  build:
    runs-on: act_runner
    # 使用轻量级 docker:cli 镜像 (约 30MB)
    container:
      image: docker:cli

    steps:
      - name: Set Gitea Host
        run: |
          GITEA_HOST_FROM_SECRET="${{ secrets.GITEA_HOST }}"
          echo "GITEA_HOST=${GITEA_HOST_FROM_SECRET:-gitea.vitecut.com}" >> $GITHUB_ENV

      # 1. 替换阿里云源并安装 Git
      - name: Install Git
        run: |
          echo "------ 正在切换为阿里云 Alpine 软件源 ------"
          # 使用 sed 命令将默认源替换为阿里云镜像源，解决下载卡顿问题
          sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories

          echo "------ 开始更新软件源 ------"
          apk update --no-cache

          echo "------ 开始安装 Git ------"
          apk add --no-cache git

          echo "------ 验证 Git 版本 ------"
          git --version

      # 2. 验证 Docker 环境
      - name: Check Docker Environment
        run: |
          echo "------ 检查 Docker 运行状态 ------"
          docker version
          echo "------ 检查 Socket 访问权限 ------"
          ls -la /var/run/docker.sock

      # 3. 使用原生 Git 克隆代码
      - name: Checkout code
        run: |
          echo "开始清理旧代码并克隆仓库..."
          rm -rf ./* || true
          # 使用 Token 认证拉取代码
          git clone --depth 1 https://${{ secrets.DOCKER_USERNAME }}:${{ secrets.MY_GITEA_TOKEN }}@${GITEA_HOST}/${{ gitea.repository }}.git .
          echo "代码克隆完成。"

      # 4. 原生 Docker 登录
      - name: Docker Login
        run: |
          echo "正在登录 Gitea Registry..."
          echo "${{ secrets.MY_GITEA_TOKEN }}" | docker login ${GITEA_HOST} -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 5. 设置变量 (替代 metadata-action)
      - name: Set Env
        run: |
          # 定义镜像基础路径
          IMAGE_PATH="${GITEA_HOST}/${{ gitea.repository_owner }}/vitecut-base"
          # 缩短的 SHA 值
          SHORT_SHA=$(git rev-parse --short HEAD)
          # 存入环境变量供后续步骤使用
          echo "FULL_IMAGE_NAME=${IMAGE_PATH}:latest" >> $GITHUB_ENV
          echo "SHA_IMAGE_NAME=${IMAGE_PATH}:${SHORT_SHA}" >> $GITHUB_ENV
          echo "变量设置完毕: ${IMAGE_PATH}"

      # 6. 原生 Docker 构建与推送
      - name: Build and Push Image
        run: |
          echo "开始构建镜像: $FULL_IMAGE_NAME"
          # 构建镜像（调用宿主机 Docker 引擎）
          docker build -f Dockerfile.base -t $FULL_IMAGE_NAME -t $SHA_IMAGE_NAME .

          echo "正在将镜像推送到 Gitea Registry..."
          # 推送 latest 标签
          docker push $FULL_IMAGE_NAME
          # 推送 SHA 标签
          docker push $SHA_IMAGE_NAME
          echo "所有流程执行成功！"
